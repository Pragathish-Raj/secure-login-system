<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <p class="subtitle">Join our secure platform today</p>
        
        <form id="registerForm" onsubmit="register(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="John">
                    <span class="error-msg" id="firstNameError"></span>
                </div>
                
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe">
                    <span class="error-msg" id="lastNameError"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john.doe@example.com">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                    <span class="error-msg" id="dobError"></span>
                </div>

                <div class="form-group">
                    <label for="state">State</label>
                    <select id="state">
                        <option value="" disabled selected>Select State</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Delhi">Delhi</option>
                    </select>
                    <span class="error-msg" id="stateError"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="mobileNo">Mobile Number</label>
                <input type="tel" id="mobileNo" placeholder="1234567890">
                <span class="error-msg" id="mobileNoError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
                <span class="error-msg" id="passwordError"></span>
            </div>

            <button type="submit" id="registerBtn">Register</button>
            <div id="generalError" class="error-msg" style="text-align: center; margin-top: 5px;"></div>
        </form>

        <p class="link-text">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
