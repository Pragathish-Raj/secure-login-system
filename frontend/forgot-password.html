<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p class="subtitle" id="form-subtitle">Enter your email to receive an OTP</p>
        
        <!-- Step 1: Request OTP Form -->
        <form id="requestOtpForm" onsubmit="sendOtp(event)">
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" placeholder="john.doe@example.com" required>
                <span class="error-msg" id="resetEmailError"></span>
            </div>
            <button type="submit" id="sendOtpBtn">Send OTP</button>
            <div id="otpSuccessMessage" style="text-align: center; margin-top: 10px; color: #4CAF50; font-size: 0.9rem;"></div>
            <div id="otpGeneralError" class="error-msg" style="text-align: center; margin-top: 5px;"></div>
        </form>

        <!-- Step 2: Verify OTP and Reset Password Form (Hidden initially) -->
        <form id="verifyOtpForm" onsubmit="resetPassword(event)" style="display: none;">
            <div class="form-group">
                <label for="otpCode">6-Digit OTP</label>
                <input type="text" id="otpCode" placeholder="123456" required>
                <span class="error-msg" id="otpError"></span>
            </div>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
                <span class="error-msg" id="newPasswordError"></span>
            </div>

            <button type="submit" id="resetBtn">Reset Password</button>
            <div id="resetSuccessMessage" style="text-align: center; margin-top: 10px; color: #4CAF50; font-size: 0.9rem;"></div>
            <div id="resetGeneralError" class="error-msg" style="text-align: center; margin-top: 5px;"></div>
        </form>

        <p class="link-text" style="margin-top: 20px;">Remember your password? <a href="login.html">Login here</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
